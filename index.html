<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Translational Scorecard</title>

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --primary:#3b82f6;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family: Inter, system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:auto;
  padding:24px;
}

.header{
  margin-bottom:24px;
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  color:var(--muted);
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.score{
  font-size:32px;
  font-weight:600;
}

.domain-nav{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.domain-btn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
}

.domain-btn.active{
  background:var(--primary);
  color:white;
  border:none;
}

.criterion{
  padding:16px;
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:14px;
}

.criterion h3{
  margin:0 0 6px 0;
  font-size:16px;
}

.criterion p{
  margin:0 0 10px 0;
  font-size:13px;
  color:var(--muted);
}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
}

select{
  padding:6px;
  border-radius:6px;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
  resize:vertical;
  min-height:60px;
}

.next-btn{
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Translational Readiness Scorecard</h1>
    <p>Evaluate therapies across key domains</p>
  </div>

  <div class="card">
    <div>Total Score</div>
    <div class="score" id="total">0</div>
  </div>

  <div class="domain-nav" id="nav"></div>

  <div class="card" id="content"></div>

</div>

<script>

const domains = [
  {
    name:"Biology",
    criteria:[
      {title:"Cell retention",desc:"Retention beyond 72h"},
      {title:"Viability",desc:"Survival in ischemic conditions"}
    ]
  },
  {
    name:"Clinical",
    criteria:[
      {title:"Endpoints",desc:"Patient-centered outcomes"},
      {title:"Design",desc:"Randomized, controlled"}
    ]
  }
];

let active = 0;
const state = domains.map(d=>d.criteria.map(()=>0));

function total(){
  return state.flat().reduce((a,b)=>a+b,0);
}

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';

  domains.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='domain-btn'+(i===active?' active':'');
    btn.innerText=d.name;
    btn.onclick=()=>{active=i;render();};
    nav.appendChild(btn);
  });
}

function renderContent(){
  const el=document.getElementById('content');
  el.innerHTML='';

  domains[active].criteria.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='criterion';

    div.innerHTML=`
      <h3>${c.title}</h3>
      <p>${c.desc}</p>
      <div class="controls">
        Score:
        <select onchange="setScore(${active},${i},this.value)">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>
      <textarea placeholder="Add justification..."></textarea>
    `;

    el.appendChild(div);
  });
}

function setScore(d,i,val){
  state[d][i]=parseInt(val);
  document.getElementById('total').innerText=total();
}

function render(){
  renderNav();
  renderContent();
  document.getElementById('total').innerText=total();
}

render();

</script>

</body>
</html>
